name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run build
      - name: Generate inspection report
        run: make inspect-report INPUT=tests/fixtures/includes-invalid-steps/input.adoc > inspection-report.json
      - name: Upload inspection report
        uses: actions/upload-artifact@v4
        with:
          name: inspection-report
          path: inspection-report.json
      - name: Emit inspection annotations
        run: bun run inspect:report -- tests/fixtures/includes-invalid-steps/input.adoc --format github-actions || true
      - run: bun run unit
      - run: bun run check
      - run: bun run release:check
